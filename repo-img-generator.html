<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<title>Repo Card Generator</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
    body {
        background: #0f172a;
        color: white;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        padding: 20px;
    }

    .controls {
        display: flex;
        flex-direction: column;
        gap: 10px;
        width: 400px;
    }

    input, textarea {
        padding: 10px;
        border-radius: 8px;
        border: none;
        font-size: 14px;
    }

    button {
        padding: 10px;
        border: none;
        border-radius: 8px;
        background: #e11d48;
        color: white;
        cursor: pointer;
    }

    /* === CARD === */
    .card {
        background: #111827;
        width: 278px;
        padding: 16px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }

    .title {
        font-size: 18px;
        font-weight: 700;
        color: #fb7185;
        margin-bottom: 12px;
    }

    .description {
        font-size: 14px;
        color: #d1d5db;
        line-height: 1.5;
        margin-bottom: 16px;
    }

    .lang {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
        color: #d1d5db;
    }

    .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #3572A5; /* Python color */
    }
</style>
</head>

<body>

<div class="controls">
    <input id="repo" placeholder="repo-name" value="tuya-led-controller-api">
    <textarea id="desc">Позволяет управлять светодиодными устройствами на базе Tuya через API, а также автоматизировать и интегрировать их в кастомные системы.</textarea>
    <input id="lang" placeholder="language" value="Python">

    <button onclick="generate()">Обновить</button>
    <button onclick="download()">Скачать PNG</button>
</div>

<div id="card" class="card">
    <div class="title" id="title"></div>
    <div class="description" id="description"></div>
    <div class="lang">
        <div class="dot"></div>
        <div id="language"></div>
    </div>
</div>

<script>
function generate() {
    document.getElementById("title").innerText = document.getElementById("repo").value;
    document.getElementById("description").innerText = document.getElementById("desc").value;
    document.getElementById("language").innerText = document.getElementById("lang").value;
}

async function download() {
    const card = document.getElementById("card");

    const canvas = await html2canvas(card, {
        backgroundColor: null,
        scale: 2  // 🔥 повышает четкость
    });

    const link = document.createElement("a");
    link.download = "repo-card.png";
    link.href = canvas.toDataURL();
    link.click();
}

generate();
</script>

</body>
</html>
